<style>
:root{
  --bg:#12161F;--surface:#1A1F2E;--s2:#222840;--s3:#2A3050;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.05);
  --accent:#B87333;--adk:#9A5E22;
  --accent-glow:rgba(184,115,51,.35);
  --accent-soft:rgba(184,115,51,.12);
  --accent-border:rgba(184,115,51,.25);
  --text:#E8E0D0;--muted:rgba(232,224,208,.42);--faint:rgba(232,224,208,.18);
  --sh:0 4px 24px rgba(0,0,0,.4);--sh-sm:0 2px 10px rgba(0,0,0,.3);
  --hook:#B87333;--hook-bg:rgba(184,115,51,.13);--hook-border:rgba(184,115,51,.3);
  --ctx:#6AAF82;--ctx-bg:rgba(74,124,89,.13);--ctx-border:rgba(74,124,89,.3);
  --body-c:#5A7EC9;--body-bg:rgba(58,92,139,.13);--body-border:rgba(58,92,139,.3);
  --cta:#C47AAF;--cta-bg:rgba(124,58,107,.13);--cta-border:rgba(124,58,107,.3);
  --out:#8A6AC9;--out-bg:rgba(92,58,124,.13);--out-border:rgba(92,58,124,.3);
  --s-high:#6AAF82;--s-high-bg:rgba(74,124,89,.15);
  --s-mid:#C9962A;--s-mid-bg:rgba(184,115,51,.15);
  --s-low:#C05A5A;--s-low-bg:rgba(139,58,58,.18);
  --hh:50px;--nh:56px;
}
.theme-warm{
  --bg:#F5F2EC;--surface:#FFFFFF;--s2:#EDE9E1;--s3:#E0D8CE;
  --border:#DDD8CE;--border2:#E8E4DC;
  --accent:#C4522A;--adk:#A8421E;--accent-glow:rgba(196,82,42,.3);
  --accent-soft:rgba(196,82,42,.08);--accent-border:rgba(196,82,42,.25);
  --text:#1C1917;--muted:#6B6560;--faint:rgba(28,25,23,.15);
  --sh:0 2px 12px rgba(0,0,0,.08);--sh-sm:0 1px 6px rgba(0,0,0,.06);
  --hook:#C4522A;--hook-bg:#fff3e0;--hook-border:#f0c080;
  --ctx:#276b2c;--ctx-bg:#e8f5e9;--ctx-border:#a5d6a7;
  --body-c:#1a4f9c;--body-bg:#e8eef8;--body-border:#90b4e9;
  --cta:#7b0d3e;--cta-bg:#fce4ec;--cta-border:#f48fb1;
  --out:#5e1a8a;--out-bg:#f3e5f5;--out-border:#ce93d8;
}
.theme-ocean{
  --bg:#EEF3F8;--surface:#FFFFFF;--s2:#D8E6F0;--s3:#C8D8E8;
  --border:rgba(15,37,53,.12);--border2:rgba(15,37,53,.07);
  --accent:#1A6B8A;--adk:#125A76;--accent-glow:rgba(26,107,138,.3);
  --accent-soft:rgba(26,107,138,.1);--accent-border:rgba(26,107,138,.3);
  --text:#0F2535;--muted:rgba(15,37,53,.5);--faint:rgba(15,37,53,.15);
  --sh:0 2px 12px rgba(15,37,53,.1);--sh-sm:0 1px 6px rgba(15,37,53,.07);
  --hook:#C06010;--hook-bg:rgba(192,96,16,.08);--hook-border:rgba(192,96,16,.3);
  --ctx:#1A7A40;--ctx-bg:rgba(26,122,64,.08);--ctx-border:rgba(26,122,64,.3);
  --body-c:#1A5A9C;--body-bg:rgba(26,90,156,.08);--body-border:rgba(26,90,156,.3);
  --cta:#8A1050;--cta-bg:rgba(138,16,80,.08);--cta-border:rgba(138,16,80,.3);
  --out:#6A1AA0;--out-bg:rgba(106,26,160,.08);--out-border:rgba(106,26,160,.3);
}
.theme-forest{
  --bg:#F0F4EF;--surface:#FFFFFF;--s2:#DDE8DA;--s3:#CDD8CA;
  --border:rgba(26,46,31,.12);--border2:rgba(26,46,31,.07);
  --accent:#2D6A4F;--adk:#1E5A40;--accent-glow:rgba(45,106,79,.3);
  --accent-soft:rgba(45,106,79,.1);--accent-border:rgba(45,106,79,.3);
  --text:#1A2E1F;--muted:rgba(26,46,31,.5);--faint:rgba(26,46,31,.15);
  --sh:0 2px 12px rgba(26,46,31,.08);--sh-sm:0 1px 6px rgba(26,46,31,.05);
  --hook:#B05A10;--hook-bg:rgba(176,90,16,.08);--hook-border:rgba(176,90,16,.3);
  --ctx:#2D6A4F;--ctx-bg:rgba(45,106,79,.1);--ctx-border:rgba(45,106,79,.3);
  --body-c:#2A4A8A;--body-bg:rgba(42,74,138,.08);--body-border:rgba(42,74,138,.3);
  --cta:#8A1050;--cta-bg:rgba(138,16,80,.08);--cta-border:rgba(138,16,80,.3);
  --out:#6A1AA0;--out-bg:rgba(106,26,160,.08);--out-border:rgba(106,26,160,.3);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;color-scheme:dark;overscroll-behavior:none;}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
input,textarea,select{font-family:'DM Sans',sans-serif;color:var(--text);}
.hide{display:none!important;}

/* LOGIN */
#loginScreen{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;overflow:hidden;}
#loginScreen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 10%,rgba(184,115,51,.08) 0%,transparent 60%);pointer-events:none;}
.ls-wordmark{font-family:'Playfair Display',serif;font-size:2.6rem;font-weight:700;color:var(--accent);font-style:italic;letter-spacing:-.02em;margin-bottom:8px;position:relative;}
.ls-wordmark span{color:var(--text);font-style:normal;}
.ls-tagline{font-size:.65rem;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:56px;position:relative;}
.ls-actions{width:100%;max-width:320px;display:flex;flex-direction:column;gap:10px;position:relative;}
.ls-google{display:flex;align-items:center;justify-content:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:13px 20px;font-size:.88rem;font-weight:600;color:var(--text);transition:background .12s;width:100%;}
.ls-google svg{width:18px;height:18px;flex-shrink:0;}
.ls-guest{background:transparent;border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:.84rem;font-weight:500;color:var(--muted);transition:all .12s;width:100%;}
.ls-footer{position:absolute;bottom:28px;left:0;right:0;display:flex;gap:10px;justify-content:center;font-size:.62rem;color:var(--faint);}
.ls-footer span{cursor:pointer;transition:color .12s;}
.ls-footer span:hover{color:var(--muted);}

/* APP SHELL */
#app{flex:1;display:flex;flex-direction:column;overflow:hidden;}
header{height:var(--hh);flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;z-index:10;}
.logo{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;color:var(--accent);font-style:italic;letter-spacing:-.01em;}
.logo span{color:var(--text);font-style:normal;}
.hdr-right{display:flex;align-items:center;gap:4px;}
.hdr-btn{background:none;border:none;color:var(--muted);padding:7px;border-radius:8px;display:flex;align-items:center;transition:color .12s;}
.hdr-btn:hover{color:var(--text);}
.hdr-btn svg{width:18px;height:18px;}

/* Hub screen layout */#screen-hub{display:flex;flex-direction:column;}
/* Hub pill */
.hub-pill-wrap{display:flex;align-items:center;gap:8px;}
.hub-label{font-size:.68rem;font-weight:600;color:var(--muted);letter-spacing:.04em;}
.hub-pill{
  background:var(--accent-soft);
  border:1.5px solid var(--accent-border);
  border-radius:20px;padding:5px 12px;
  display:flex;align-items:center;gap:6px;
  cursor:pointer;transition:all .18s;
  box-shadow:0 0 0 0 var(--accent-glow);
  animation:pillPulse 2.8s ease-in-out infinite;
}
.hub-pill:active{transform:scale(.96);}
.hub-pill svg{width:14px;height:14px;color:var(--accent);}
.hub-pill-text{font-size:.62rem;font-weight:700;color:var(--accent);letter-spacing:.04em;}
@keyframes pillPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(184,115,51,.0);}
  50%{box-shadow:0 0 0 4px rgba(184,115,51,.12);}
}
.hub-pill-expanded{background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:20px;padding:4px 6px;display:flex;align-items:center;gap:2px;}
.hub-tab-btn{width:32px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;transition:background .12s;}
.hub-tab-btn svg{width:15px;height:15px;color:var(--muted);}
.hub-tab-btn.on{background:var(--accent-soft);}
.hub-tab-btn.on svg{color:var(--accent);}
.hub-tab-btn.dim{opacity:.25;pointer-events:none;}
.hub-sub{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}
.hub-sub.hide{display:none!important;}
.hub-pill-div{width:1px;height:14px;background:var(--border);margin:0 2px;}

/* Screens */
.screens{flex:1;overflow:hidden;position:relative;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;opacity:0;pointer-events:none;transition:opacity .15s;}
.screen.on{opacity:1;pointer-events:all;}
.scr-scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;}

/* Nav */
nav{height:var(--nh);flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);display:flex;}
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:6px 4px;font-size:.54rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-top:2px solid transparent;transition:all .12s;border-bottom:none;border-left:none;border-right:none;background:none;}
.nt svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;}
.nt.on{color:var(--accent);border-top-color:var(--accent);background:var(--accent-soft);}

/* Search */
.search-bar{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.search-inner{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:8px;}
.search-inner svg{width:15px;height:15px;color:var(--muted);flex-shrink:0;}
.search-inp{flex:1;background:none;border:none;outline:none;font-size:.82rem;color:var(--text);}
.search-inp::placeholder{color:var(--muted);}
.search-clear{background:none;border:none;color:var(--muted);padding:2px;display:flex;}
.search-clear svg{width:14px;height:14px;}

/* Filter pills */
.filter-row{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-row{align-items:center;}
.add-pill{
  display:flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  background:var(--accent);border:none;
  flex-shrink:0;margin-left:auto;
  box-shadow:0 2px 10px var(--accent-glow);
  transition:transform .12s;
}
.add-pill:active{transform:scale(.92);}
.add-pill svg{width:16px;height:16px;stroke:#0A0D14;flex-shrink:0;}
.fpill{padding:5px 13px;border-radius:20px;font-size:.68rem;font-weight:700;color:var(--muted);border:1px solid var(--border);background:transparent;white-space:nowrap;cursor:pointer;transition:all .12s;flex-shrink:0;}
.fpill.on{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-border);}

/* Script cards */
.scripts-list{padding:12px 14px 20px;display:flex;flex-direction:column;gap:8px;}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh-sm);position:relative;}
.scard-inner{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;}
.scard-ico{width:38px;height:38px;border-radius:9px;background:var(--accent-soft);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.scard-ico svg{width:18px;height:18px;color:var(--accent);}
.scard-info{flex:1;min-width:0;}
.scard-name{font-size:.88rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.scard-meta{font-size:.64rem;color:var(--muted);}
.scard-row{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.sbadge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:700;}
.sbadge-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.sbadge.draft{background:var(--s2);color:var(--muted);}
.sbadge.draft .sbadge-dot{background:var(--muted);}
.sbadge.progress{background:rgba(58,92,139,.15);color:#5A7EC9;}
.sbadge.progress .sbadge-dot{background:#5A7EC9;}
.sbadge.ready{background:rgba(74,124,89,.15);color:var(--s-high);}
.sbadge.ready .sbadge-dot{background:var(--s-high);}
.sbadge.filmed{background:rgba(92,58,124,.15);color:#8A6AC9;}
.sbadge.filmed .sbadge-dot{background:#8A6AC9;}
.score-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:.58rem;font-weight:700;}
.score-chip-dot{width:4px;height:4px;border-radius:50%;}
.score-chip.high{background:var(--s-high-bg);color:var(--s-high);}
.score-chip.high .score-chip-dot{background:var(--s-high);}
.score-chip.mid{background:var(--s-mid-bg);color:var(--s-mid);}
.score-chip.mid .score-chip-dot{background:var(--s-mid);}
.score-chip.low{background:var(--s-low-bg);color:var(--s-low);}
.score-chip.low .score-chip-dot{background:var(--s-low);}
.add-bar{padding:12px 14px;border-top:1px solid var(--border);display:flex;justify-content:center;background:var(--bg);flex-shrink:0;}
.add-btn{display:inline-flex;align-items:center;gap:7px;padding:12px 28px;border-radius:30px;background:var(--accent);color:#0A0D14;border:none;font-size:.86rem;font-weight:700;box-shadow:0 4px 20px var(--accent-glow);transition:transform .12s;}
.add-btn:active{transform:scale(.97);}
.add-btn svg{width:14px;height:14px;}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 28px;min-height:360px;}
.eico{width:54px;height:54px;border-radius:14px;background:var(--accent-soft);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.eico svg{width:22px;height:22px;color:var(--accent);}
.empty-state h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--text)!important;margin-bottom:8px;font-weight:700;}
.empty-state p{font-size:.78rem;color:var(--muted);line-height:1.65;max-width:240px;margin-bottom:22px;}
.empty-hint{font-size:.64rem;color:var(--faint);margin-top:12px;line-height:1.6;}

/* Write tab */
.write-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.write-title{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px;}
.write-actions{display:flex;gap:4px;}
.pb-list{padding:12px 14px 80px;display:flex;flex-direction:column;gap:8px;}
.pb{background:var(--s2);border:1px solid var(--border);border-left:3px solid var(--border);border-radius:10px;overflow:hidden;}
.pb.tag-hook{border-left-color:var(--hook);}
.pb.tag-ctx{border-left-color:var(--ctx);}
.pb.tag-body{border-left-color:var(--body-c);}
.pb.tag-cta{border-left-color:var(--cta);}
.pb.tag-out{border-left-color:var(--out);}
.pb-hd{display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);}
.pb-tag{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex:1;}
.pb.tag-hook .pb-tag{color:var(--hook);}
.pb.tag-ctx .pb-tag{color:var(--ctx);}
.pb.tag-body .pb-tag{color:var(--body-c);}
.pb.tag-cta .pb-tag{color:var(--cta);}
.pb.tag-out .pb-tag{color:var(--out);}
.score-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:.58rem;font-weight:700;white-space:nowrap;}
.score-pill-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.score-pill.high{background:var(--s-high-bg);color:var(--s-high);}
.score-pill.high .score-pill-dot{background:var(--s-high);}
.score-pill.mid{background:var(--s-mid-bg);color:var(--s-mid);}
.score-pill.mid .score-pill-dot{background:var(--s-mid);}
.score-pill.low{background:var(--s-low-bg);color:var(--s-low);}
.score-pill.low .score-pill-dot{background:var(--s-low);}
.pb-body{padding:10px 12px;}
.pb-ta{width:100%;background:none;border:none;outline:none;resize:none;font-size:.86rem;line-height:1.75;color:var(--text);min-height:60px;font-family:'DM Sans',sans-serif;}
.pb-ta::placeholder{color:var(--muted);}
.pb-ft{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-top:1px solid var(--border);}
.pb-wc{font-size:.6rem;color:var(--faint);}
.pb-actions{display:flex;gap:2px;}
.pb-action{background:none;border:none;color:var(--muted);padding:4px 6px;border-radius:5px;font-size:.7rem;display:flex;align-items:center;transition:color .12s;}
.pb-action svg{width:14px;height:14px;}
.pb-add-bar{padding:10px 14px;display:flex;justify-content:center;}
.pb-add-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 22px;border-radius:30px;background:var(--accent);color:#0A0D14;border:none;font-size:.8rem;font-weight:700;box-shadow:0 3px 14px var(--accent-glow);}
.pb-add-btn svg{width:13px;height:13px;}
.write-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;min-height:300px;}
.write-empty p{font-size:.82rem;color:var(--muted);line-height:1.65;margin-bottom:16px;}
.tag-sel{display:flex;gap:6px;flex-wrap:wrap;padding:4px 0 12px;}
.tag-opt{padding:6px 14px;border-radius:20px;font-size:.72rem;font-weight:700;border:1px solid var(--border);background:transparent;cursor:pointer;transition:all .12s;}
.tag-opt.hook{color:var(--hook);border-color:var(--hook-border);}
.tag-opt.hook:hover,.tag-opt.hook.on{background:var(--hook-bg);}
.tag-opt.ctx{color:var(--ctx);border-color:var(--ctx-border);}
.tag-opt.ctx:hover,.tag-opt.ctx.on{background:var(--ctx-bg);}
.tag-opt.body-t{color:var(--body-c);border-color:var(--body-border);}
.tag-opt.body-t:hover,.tag-opt.body-t.on{background:var(--body-bg);}
.tag-opt.cta{color:var(--cta);border-color:var(--cta-border);}
.tag-opt.cta:hover,.tag-opt.cta.on{background:var(--cta-bg);}
.tag-opt.out{color:var(--out);border-color:var(--out-border);}
.tag-opt.out:hover,.tag-opt.out.on{background:var(--out-bg);}

/* Drawer */
.dov{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:80;pointer-events:none;transition:all .22s;}
.dov.open{background:rgba(0,0,0,.65);pointer-events:all;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.drawer{position:fixed;top:0;right:0;bottom:0;width:86%;max-width:320px;background:var(--surface);z-index:81;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);border-left:1px solid var(--border);box-shadow:-8px 0 40px rgba(0,0,0,.5);}
.drawer.open{transform:translateX(0);}
.drawer-hd{padding:14px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.drawer-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text);}
.drawer-close{background:none;border:none;color:var(--muted);padding:4px;display:flex;align-items:center;}
.drawer-close svg{width:18px;height:18px;}
.drawer-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.dtab{flex:1;padding:9px 4px;text-align:center;font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:all .12s;}
.dtab.on{color:var(--accent);border-bottom-color:var(--accent);}
.drawer-body{flex:1;overflow-y:auto;padding:12px 14px 24px;display:flex;flex-direction:column;gap:8px;}
.fact-item{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;gap:8px;align-items:flex-start;font-size:.82rem;line-height:1.6;color:var(--text);}
.fact-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:6px;}
.fact-text{flex:1;}
.fact-del{background:none;border:none;color:var(--faint);padding:2px;display:flex;flex-shrink:0;transition:color .12s;}
.fact-del svg{width:13px;height:13px;}
.add-fact-btn{width:100%;padding:10px;border:1px dashed var(--accent-border);border-radius:9px;background:transparent;color:var(--muted);font-size:.78rem;cursor:pointer;text-align:center;transition:all .14s;}
.link-item{background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;display:flex;gap:8px;align-items:center;}
.link-ico{color:var(--accent);flex-shrink:0;}
.link-ico svg{width:14px;height:14px;}
.link-info{flex:1;min-width:0;}
.link-label{font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-url{font-size:.64rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-open{background:none;border:none;color:var(--muted);padding:4px;display:flex;}
.link-open svg{width:14px;height:14px;}

/* View Script */
.view-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:var(--hh);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.view-back{background:none;border:none;color:var(--muted);padding:4px;display:flex;align-items:center;flex-shrink:0;}
.view-back svg{width:20px;height:20px;}
.view-title{font-family:'Playfair Display',serif;font-size:.95rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.view-acts{display:flex;gap:2px;flex-shrink:0;}
.view-meta{padding:9px 20px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;gap:12px;align-items:center;font-size:.65rem;color:var(--muted);flex-shrink:0;}
.view-meta-dot{width:3px;height:3px;border-radius:50%;background:var(--border);}
.view-body{padding:28px 20px 60px;}
.view-script-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--text);margin-bottom:24px;line-height:1.3;}
.view-section{display:flex;gap:14px;margin-bottom:22px;}
.view-bar{width:3px;border-radius:2px;flex-shrink:0;margin-top:4px;}
.view-bar.hook{background:var(--hook);}
.view-bar.ctx{background:var(--ctx);}
.view-bar.body-t{background:var(--body-c);}
.view-bar.cta{background:var(--cta);}
.view-bar.out{background:var(--out);}
.view-para{font-size:.88rem;line-height:1.88;color:var(--text);text-align:justify;flex:1;}
.view-footer{margin-top:32px;padding-top:16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;font-size:.62rem;color:var(--faint);}

/* Stats */
.stats-seg{display:flex;background:rgba(255,255,255,.04);border-radius:20px;padding:3px;margin:14px 14px 0;gap:2px;border:1px solid var(--border);flex-shrink:0;}
.sseg-btn{flex:1;padding:7px 6px;border-radius:16px;border:none;background:transparent;font-size:.68rem;font-weight:700;color:var(--muted);cursor:pointer;letter-spacing:.02em;transition:all .12s;}
.sseg-btn.on{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.3);}
.stats-body{padding:12px 14px 24px;display:flex;flex-direction:column;gap:12px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;}
.stat-card-title{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-bottom:14px;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.hcell{background:rgba(255,255,255,.03);border-radius:10px;padding:12px 8px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;}
.hcell.streak{background:var(--accent-soft);border:1px solid var(--accent-border);}
.hcell svg{width:15px;height:15px;color:var(--muted);}
.hcell.streak svg{color:var(--accent);}
.hcell-num{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--text);line-height:1;}
.hcell.streak .hcell-num{color:var(--accent);}
.hcell-lbl{font-size:.56rem;color:var(--muted);}
.streak-dots{display:flex;justify-content:center;gap:5px;margin-top:12px;}
.sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.07);}
.sdot.f{background:var(--accent);}
.sdot.t{background:var(--accent);box-shadow:0 0 0 2px var(--surface),0 0 0 3px rgba(184,115,51,.4);}
.status-pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:12px;justify-content:center;}
.tag-bar{height:6px;border-radius:3px;overflow:hidden;display:flex;gap:1px;margin:4px 0 8px;}
.tag-seg{height:100%;transition:width .3s;}
.tag-legend{display:flex;justify-content:space-between;}
.tleg-item{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;}
.tleg-dot{width:6px;height:6px;border-radius:50%;}
.tleg-pct{font-size:.58rem;font-weight:700;color:var(--text);}
.tleg-name{font-size:.52rem;color:var(--muted);}
.ring-row{display:flex;align-items:center;gap:16px;}
.ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0;}
.ring-wrap svg{width:72px;height:72px;transform:rotate(-90deg);}
.ring-track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:8;}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;}
.ring-lbl{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--accent);line-height:1;}
.ring-sub{font-size:.46rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.ring-info-title{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:3px;}
.ring-info-sub{font-size:.7rem;color:var(--muted);line-height:1.5;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:64px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar-outer{width:100%;flex:1;display:flex;align-items:flex-end;}
.bar-inner{width:100%;border-radius:4px 4px 0 0;min-height:3px;}
.bar-inner.peak{background:var(--accent);}
.bar-inner.rest{background:rgba(255,255,255,.09);}
.bar-lbl{font-size:.52rem;color:var(--muted);}
.time-row{display:flex;gap:6px;}
.time-block{flex:1;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.time-block.peak{background:var(--accent-soft);border-color:var(--accent-border);}
.time-ico{font-size:.95rem;margin-bottom:3px;}
.time-lbl{font-size:.6rem;font-weight:700;color:var(--muted);}
.time-block.peak .time-lbl{color:var(--accent);}
.time-count{font-size:.56rem;color:var(--faint);margin-top:2px;}
.ratio-row{display:flex;align-items:center;gap:12px;}
.ratio-pct{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--s-high);flex-shrink:0;}
.ratio-bars{flex:1;display:flex;flex-direction:column;gap:6px;}
.ratio-item{display:flex;align-items:center;gap:8px;}
.ratio-lbl{font-size:.64rem;color:var(--muted);width:58px;flex-shrink:0;}
.ratio-track{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.ratio-fill{height:100%;border-radius:3px;}
.ratio-fill.started{background:rgba(184,115,51,.5);}
.ratio-fill.done{background:var(--s-high);}
.ratio-num{font-size:.64rem;font-weight:700;color:var(--text);width:16px;text-align:right;flex-shrink:0;}
.best-row{display:flex;align-items:center;gap:14px;}
.best-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--text);line-height:1;flex-shrink:0;}
.best-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.best-date{font-size:.8rem;font-weight:600;color:var(--text);}
.best-sub{font-size:.66rem;color:var(--muted);margin-top:2px;}
.pro-lock-card{background:rgba(255,255,255,.02);border:1px dashed rgba(255,255,255,.08);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.pro-lock-card svg{width:16px;height:16px;color:var(--muted);}
.pro-lock-lbl{font-size:.78rem;font-weight:600;color:var(--muted);}
.pro-lock-sub{font-size:.64rem;color:var(--faint);margin-top:2px;}

/* Analyse */
.analyse-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;min-height:480px;}
.analyse-empty h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--text);margin-bottom:6px;}
.analyse-empty p{font-size:.76rem;color:var(--muted);line-height:1.65;margin-bottom:20px;max-width:250px;}
.paste-area{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:.82rem;color:var(--text);resize:none;outline:none;min-height:80px;line-height:1.65;transition:border .12s;}
.paste-area::placeholder{color:var(--muted);font-style:italic;}
.paste-area:focus{border-color:var(--accent);}
.analyse-btns{display:flex;gap:8px;margin-top:10px;width:100%;}
.abtn-p{flex:1;padding:10px;border-radius:8px;background:var(--accent);color:#0A0D14;border:none;font-size:.82rem;font-weight:700;}
.abtn-g{padding:10px 14px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.8rem;}
.analyse-compact-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin:12px 14px 0;}
.analyse-compact-title{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:10px;}
.history-label{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin:14px 14px 6px;}
.history-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;margin:0 14px 8px;transition:background .12s;}
.history-card:active{background:var(--s2);}
.hscore{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;flex-shrink:0;}
.hscore.high{background:var(--s-high-bg);color:var(--s-high);}
.hscore.mid{background:var(--s-mid-bg);color:var(--s-mid);}
.hscore.low{background:var(--s-low-bg);color:var(--s-low);}
.hinfo{flex:1;min-width:0;}
.htitle{font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.hmeta{font-size:.62rem;color:var(--muted);}
.harrow svg{width:14px;height:14px;color:var(--faint);}
.view-all-btn{display:block;width:calc(100% - 28px);margin:0 14px 14px;padding:10px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--accent);font-size:.74rem;font-weight:600;text-align:center;cursor:pointer;}
.res-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:var(--hh);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.res-back{background:none;border:none;color:var(--muted);padding:4px;display:flex;flex-shrink:0;}
.res-back svg{width:20px;height:20px;}
.res-title{font-family:'Playfair Display',serif;font-size:.95rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-date{font-size:.6rem;color:var(--muted);flex-shrink:0;}
.score-banner{background:linear-gradient(135deg,rgba(184,115,51,.09),rgba(184,115,51,.02));border-bottom:1px solid var(--border);padding:16px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.score-banner-num{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:700;line-height:1;flex-shrink:0;}
.score-banner-num.mid{color:var(--s-mid);}
.score-banner-num.high{color:var(--s-high);}
.score-banner-num.low{color:var(--s-low);}
.score-banner-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.score-banner-verdict{font-size:.82rem;font-weight:600;color:var(--text);}
.score-banner-sub{font-size:.68rem;color:var(--muted);margin-top:2px;line-height:1.4;}
.section-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:14px;}
.sgrid-cell{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.sgrid-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.sgrid-name{font-size:.58rem;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
.sgrid-num{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;}
.sgrid-num.high{color:var(--s-high);}
.sgrid-num.mid{color:var(--s-mid);}
.sgrid-num.low{color:var(--s-low);}
.sgrid-bar{height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.sgrid-fill{height:100%;border-radius:2px;}
.sgrid-fill.high{background:var(--s-high);}
.sgrid-fill.mid{background:var(--s-mid);}
.sgrid-fill.low{background:var(--s-low);}
.sgrid-note{font-size:.62rem;color:var(--muted);line-height:1.4;}
.anno-lbl{padding:8px 14px 4px;font-size:.58rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);border-top:1px solid var(--border);}
.anno-block{margin:0 14px 10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.anno-block.tag-hook{border-left:3px solid var(--hook);}
.anno-block.tag-ctx{border-left:3px solid var(--ctx);}
.anno-block.tag-body{border-left:3px solid var(--body-c);}
.anno-block.tag-cta{border-left:3px solid var(--cta);}
.anno-block.tag-out{border-left:3px solid var(--out);}
.anno-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.03);border-bottom:1px solid var(--border);}
.anno-tag-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.anno-block.tag-hook .anno-tag-lbl{color:var(--hook);}
.anno-block.tag-ctx .anno-tag-lbl{color:var(--ctx);}
.anno-block.tag-body .anno-tag-lbl{color:var(--body-c);}
.anno-block.tag-cta .anno-tag-lbl{color:var(--cta);}
.anno-block.tag-out .anno-tag-lbl{color:var(--out);}
.anno-text{padding:12px 14px;font-size:.85rem;line-height:1.8;color:var(--text);text-align:justify;}
.anno-text.empty{color:var(--muted);font-style:italic;text-align:left;}
.hl-bad{background:rgba(139,58,58,.15);border-bottom:1px solid rgba(192,90,90,.4);border-radius:2px;padding:0 1px;}
.hl-ok{background:rgba(74,124,89,.12);border-bottom:1px solid rgba(106,175,130,.35);border-radius:2px;padding:0 1px;}
.anno-fb{padding:8px 14px 10px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;font-size:.75rem;line-height:1.55;color:rgba(192,90,90,.85);}
.anno-fb.ok{color:rgba(106,175,130,.85);}
.anno-fb-ico{flex-shrink:0;font-size:.8rem;margin-top:1px;}
.export-row{display:flex;justify-content:center;padding:16px 14px 20px;}
.export-row-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:30px;background:var(--accent-soft);border:1px solid var(--accent-border);color:var(--accent);font-size:.8rem;font-weight:600;cursor:pointer;}
.export-row-btn svg{width:14px;height:14px;}

/* Profile */
.prof-guest{display:flex;flex-direction:column;align-items:center;padding:40px 28px 80px;text-align:center;}
.prof-guest-logo{width:56px;height:56px;border-radius:16px;background:var(--accent-soft);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--accent);font-weight:700;font-style:italic;}
.prof-guest h2{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:6px;}
.prof-guest-sub{font-size:.78rem;color:var(--muted);line-height:1.65;margin-bottom:24px;max-width:260px;}
.benefits{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:28px;}
.benefit{display:flex;align-items:flex-start;gap:10px;text-align:left;}
.benefit-ico{width:28px;height:28px;border-radius:8px;background:var(--accent-soft);border:1px solid var(--accent-border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.benefit-ico svg{width:14px;height:14px;color:var(--accent);}
.benefit-txt{font-size:.78rem;color:var(--muted);line-height:1.55;}
.benefit-txt strong{color:var(--text);font-weight:600;display:block;margin-bottom:1px;}

/* Modals */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.mo.open{opacity:1;pointer-events:all;}
.modal{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:18px 18px 0 0;border-top:1px solid var(--border);padding:18px 18px 36px;transform:translateY(100%);transition:transform .22s ease;max-height:90vh;overflow-y:auto;}
.mo.open .modal{transform:translateY(0);}
.mhandle{width:32px;height:3px;border-radius:2px;background:var(--border);margin:0 auto 18px;}
.modal-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--text);margin-bottom:4px;}
.modal-sub{font-size:.72rem;color:var(--muted);margin-bottom:16px;}
.modal-inp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:.9rem;color:var(--text);outline:none;transition:border .12s;margin-bottom:6px;}
.modal-inp:focus{border-color:var(--accent);}
.modal-inp::placeholder{color:var(--muted);}
.modal-hint{font-size:.66rem;color:var(--muted);margin-bottom:16px;}
.modal-acts{display:flex;gap:8px;}
.btn-g{flex:1;padding:11px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:.84rem;font-weight:600;cursor:pointer;}
.btn-p{flex:2;padding:11px;border-radius:10px;background:var(--accent);color:#0A0D14;border:none;font-size:.84rem;font-weight:700;cursor:pointer;}
.btn-danger{padding:11px;border-radius:10px;background:rgba(139,58,58,.15);color:var(--s-low);border:1px solid rgba(139,58,58,.25);font-size:.82rem;font-weight:600;cursor:pointer;width:100%;transition:all .12s;opacity:.5;pointer-events:none;}
.btn-danger.active{opacity:1;pointer-events:all;background:var(--s-low);color:#fff;}
.confirm-type-inp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:.88rem;color:var(--text);outline:none;transition:border .12s;margin:10px 0 14px;letter-spacing:.06em;font-weight:600;text-align:center;}
.confirm-type-inp:focus{border-color:var(--s-low);}

/* Pro sheet */
.pro-sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:250;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);}
.pro-sheet-ov.open{opacity:1;pointer-events:all;}
.pro-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px 20px 44px;transform:translateY(100%);transition:transform .22s ease;max-height:92vh;overflow-y:auto;}
.pro-sheet-ov.open .pro-sheet{transform:translateY(0);}
.pro-features{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;}
.pro-feat{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.pro-feat:last-child{border-bottom:none;}

.pro-feat-ico.ready svg{width:14px;height:14px;color:var(--s-high);}
.pro-feat-ico.soon{background:rgba(255,255,255,.04);}
.pro-feat-ico.soon svg{width:14px;height:14px;color:var(--muted);}
.pro-feat-name{font-size:.82rem;font-weight:600;color:var(--text);flex:1;}
.pro-feat-name.dim{color:var(--muted);}
.pro-feat-tag{font-size:.58rem;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
.pro-price-box{background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.pro-price-num{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--text);}
.pro-price-sub{font-size:.66rem;color:var(--muted);margin-top:2px;}
.pro-price-badge{font-size:.6rem;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:20px;padding:3px 10px;}
.pro-cta-btn{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#0A0D14;border:none;font-size:.9rem;font-weight:700;cursor:pointer;margin-bottom:10px;}

/* Themes */
.theme-grid-modal{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.theme-card{border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border .14s;position:relative;}
.theme-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.theme-preview{height:50px;display:flex;align-items:flex-end;padding:6px 8px;gap:4px;}

.theme-bar.ac{opacity:1;flex:.7;}
.theme-meta{padding:8px 10px;}
.theme-name-lbl{font-size:.72rem;font-weight:600;color:var(--text);}

.theme-more{font-size:.64rem;color:var(--muted);text-align:center;padding:4px 0;}

/* Toast */
.toast{position:fixed;top:calc(var(--hh) + 12px);left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:30px;font-size:.78rem;font-weight:500;letter-spacing:.01em;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:300;opacity:0;pointer-events:none;transition:opacity .18s;white-space:nowrap;}
.toast.show{opacity:1;}
.toast.default{background:rgba(232,224,208,.12);border:1px solid rgba(232,224,208,.15);color:var(--text);}

.toast.error{background:rgba(139,58,58,.22);border:1px solid rgba(192,90,90,.2);color:#E08080;}
.toast.info{background:rgba(184,115,51,.22);border:1px solid rgba(184,115,51,.2);color:#D4A060;}
.toast svg{width:13px;height:13px;opacity:.85;}

.port-trigger-body{padding:20px 16px 32px;display:flex;flex-direction:column;gap:16px;}

.port-meta-val{font-size:.7rem;font-weight:600;color:#E8E0D0;}
.port-script-body{background:#12161F;padding:14px 16px;}
.port-script-lbl{font-size:.5rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(232,224,208,.22);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06);}
.port-para{display:flex;gap:10px;margin-bottom:9px;}

.port-export-btn{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#0A0D14;border:none;font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}

/* Long text */
.long-body{font-size:.82rem;line-height:1.75;color:var(--muted);}

// ── Score engine — YouTube-specific criteria ──
// Hook: YouTube gives you 3-5 seconds. A good hook creates an open loop the viewer
// feels compelled to close. It asks a question, makes a bold claim, or presents
// a scenario the viewer recognises and wants resolved. Starting with "I" is weak
// because the viewer doesn't know you yet. Starting with THEM or a problem is strong.
//
// Context: After the hook, viewers need one reason to stay. Not your whole biography —
// one credential, one number, one promise of what they will get. The best context
// sections are brief, specific, and viewer-focused (you will learn X, not I will show you X).
//
// Body: This is where trust is built or lost. Specific examples outperform general advice.
// Named tools, real numbers, step-by-step structure all signal credibility. Passive voice
// and filler language signal uncertainty. Longer is fine if every sentence earns its place.
//
// CTA: The best CTAs are earned, not begged. They give a reason (subscribe because we
// post every Tuesday), make a specific ask (comment with X), and arrive after value has
// been delivered. Vague CTAs (like and subscribe) perform worse than specific ones.
//
// Outro: Closes the loop opened in the hook, gives the viewer somewhere to go next,
// and leaves them feeling the time was well spent. Abrupt endings feel unfinished
// and reduce watch time on the next video.

var HOOK_OPENERS=['what if','imagine','most people','the reason','here is why','this is why','did you know','i used to','i made','i spent','i lost','i gained','you are','you have been','stop','never','always','the truth','what nobody'];
var SPECIFICITY_SIGNALS=[/\d+/,/\$\d/,/%/,/per (day|week|month|year)/,/in \d+ (days|weeks|months|years)/,/(step|tip|way|mistake|rule|hack|method|strategy)\s/];
var VIEWER_FOCUS=['you will','you can','you need','you have','your','by the end','after this','this will help you','this will show you'];
var FILLER=['basically','literally','you know','sort of','kind of','actually','i guess','i think i','as i mentioned','like i said','so yeah','um ','uh '];
var CTA_VERBS=['subscribe','follow','comment','like','share','click','watch','join','download','check out','hit the','tap the','turn on','save this','bookmark'];
var CTA_REASONS=['because','so that','if you want','to get','for more','every week','every tuesday','every monday','whenever','new video'];
var RESOLUTION_PHRASES=["so there you have it","that's it","that's all","to wrap up","in summary","to sum up","bottom line","the takeaway","now you know","hope that helps","hope this helped","as always","until next time","see you in the next","see you next","next video","next one"];

function scoreHook(t){
  if(!t||t.trim().length<5)return 0;
  var s=0,l=t.toLowerCase(),wc=wordCount(t);
  // Length: hooks should be punchy — 8 to 35 words is the sweet spot
  if(wc>=8&&wc<=35)s+=20;
  else if(wc>=5&&wc<8)s+=10;
  else if(wc>35&&wc<=55)s+=12;
  // Does not open with "I" — self-centred hooks perform poorly
  if(!l.match(/^i[\s,']/) )s+=15;
  // Opens with viewer-centric or tension language
  var hasStrongOpener=false;
  HOOK_OPENERS.forEach(function(o){if(l.indexOf(o)===0||l.indexOf(o)<=15)hasStrongOpener=true;});
  if(hasStrongOpener)s+=20;
  // Contains a question — open loops keep viewers watching
  if(t.match(/\?/))s+=15;
  // Contains specificity — numbers and named things feel credible even in hooks
  var specCount=0;
  SPECIFICITY_SIGNALS.forEach(function(r){if(r.test(l))specCount++;});
  s+=Math.min(specCount*8,16);
  // Contains tension or contrast language
  if(l.match(/(wrong|mistake|fail|stop|never|always|secret|truth|nobody|everyone|most people|actually)/))s+=14;
  return Math.min(s,100);
}

function scoreContext(t){
  if(!t||t.trim().length<5)return 0;
  var s=0,l=t.toLowerCase(),wc=wordCount(t);
  // Length: context should be brief — 20 to 60 words
  if(wc>=20&&wc<=60)s+=15;
  else if(wc>=10&&wc<20)s+=8;
  else if(wc>60&&wc<=100)s+=10;
  // First-person credential — establishes why you can talk about this
  if(l.match(/i (have|spent|built|made|tested|tried|studied|tracked|learned|discovered|worked|ran|grew|lost|gained|earned)/))s+=20;
  // Specific numbers or timeframes — vague credentials are weak
  var specCount=0;
  SPECIFICITY_SIGNALS.forEach(function(r){if(r.test(l))specCount++;});
  s+=Math.min(specCount*10,20);
  // Viewer-focused promise — tells them what THEY will get
  var vf=0;
  VIEWER_FOCUS.forEach(function(v){if(l.indexOf(v)>=0)vf++;});
  s+=Math.min(vf*12,24);
  // No filler language
  var fc=0;FILLER.forEach(function(f){if(l.indexOf(f)>=0)fc++;});
  s-=fc*8;
  // Transition language — bridges hook to main content
  if(l.match(/(so today|in this video|in this one|let me|i('m going to| will| want to))/))s+=10;
  return Math.min(Math.max(s,0),100);
}

function scoreBody(t){
  if(!t||t.trim().length<5)return 0;
  var s=20,l=t.toLowerCase(),wc=wordCount(t);
  // Minimum substance — body needs enough to actually teach something
  if(wc>=40)s+=10;
  if(wc>=80)s+=10;
  if(wc>=150)s+=5;
  // Specificity is the single biggest signal of quality in body content
  var specCount=0;
  SPECIFICITY_SIGNALS.forEach(function(r){if(r.test(l))specCount++;});
  s+=Math.min(specCount*8,24);
  // Structured language — signals organised thinking
  if(l.match(/(first|second|third|step \d|number \d|\d\.|the first|the second|next|then|finally|lastly)/))s+=15;
  // Examples and evidence
  if(l.match(/(for example|for instance|such as|like when|in my case|when i|i found that|the data|research shows|studies show|according to)/))s+=12;
  // Filler language — drains credibility
  var fc=0;FILLER.forEach(function(f){if(l.indexOf(f)>=0)fc++;});
  s-=fc*6;
  // Passive constructions signal weak authority
  var passiveCount=(l.match(/(is being|was being|have been|has been|will be|can be|should be|would be|might be)/g)||[]).length;
  s-=passiveCount*4;
  // Sentence variety — mixing short and long sentences improves retention
  var sentences=t.split(/[.!?]+/).filter(function(x){return x.trim().length>3;});
  if(sentences.length>=3){
    var lens=sentences.map(function(s){return s.trim().split(/\s+/).length;});
    var avg=lens.reduce(function(a,b){return a+b;},0)/lens.length;
    var variance=lens.reduce(function(a,b){return a+Math.abs(b-avg);},0)/lens.length;
    if(variance>=4)s+=8;
  }
  return Math.min(Math.max(s,0),100);
}

function scoreCTA(t){
  if(!t||t.trim().length<5)return 0;
  var s=10,l=t.toLowerCase(),wc=wordCount(t);
  // Length: CTAs should be direct — 10 to 50 words
  if(wc>=10&&wc<=50)s+=15;
  // Contains a specific action verb
  var av=0;CTA_VERBS.forEach(function(v){if(l.indexOf(v)>=0)av++;});
  s+=Math.min(av*15,30);
  // Gives a reason — the best CTAs earn the action
  var rv=0;CTA_REASONS.forEach(function(r){if(l.indexOf(r)>=0)rv++;});
  s+=Math.min(rv*15,25);
  // Specific ask is better than generic (comment below what X vs just comment)
  if(l.match(/(comment (below|down|with|and tell|and let)|let me know|tell me|what do you|what would you|drop a)/))s+=15;
  // Mentions next video or channel — keeps viewers in your world
  if(l.match(/(next video|next one|next week|more videos|the channel|my channel|check out|watch next|linked above|linked below|in the description)/))s+=10;
  // Penalise pure begging with no reason
  if(l.match(/please (subscribe|like|share)/) && !rv)s-=10;
  return Math.min(Math.max(s,0),100);
}

function scoreOutro(t){
  if(!t||t.trim().length<5)return 0;
  var s=10,l=t.toLowerCase(),wc=wordCount(t);
  // Length: outros can be brief — 10 to 60 words
  if(wc>=10&&wc<=60)s+=15;
  // Closes the loop — resolves or acknowledges the hook's promise
  var rc=0;
  RESOLUTION_PHRASES.forEach(function(p){if(l.indexOf(p)>=0)rc++;});
  s+=Math.min(rc*18,36);
  // Callback to opening — the most satisfying outros reference something from the hook
  if(l.match(/(remember (when|what|how|that)|back to|like i (said|mentioned) (at the start|earlier)|as i (said|mentioned)|full circle)/))s+=20;
  // Forward momentum — gives viewers somewhere to go
  if(l.match(/(next video|next one|next week|see you|until next|linked|check out|watch|coming up|dropping)/))s+=15;
  // Warmth or personal sign-off — builds relationship
  if(l.match(/(thank(s| you)|appreciate|means a lot|you('re| are) amazing|legend|absolute)/))s+=10;
  return Math.min(Math.max(s,0),100);
}
function scoreText(tag,text){
  switch(tag){case 'hook':return scoreHook(text);case 'ctx':return scoreContext(text);case 'body':return scoreBody(text);case 'cta':return scoreCTA(text);case 'out':return scoreOutro(text);}return 0;
}
function scoreLevel(n){return n>=70?'high':n>=45?'mid':'low';}
function scoreVerdict(n){return n>=70?'Strong':n>=45?'Needs Work':'Weak';}
function scorePillHTML(n){var l=scoreLevel(n);return '<span class="score-pill '+l+'"><span class="score-pill-dot"></span>'+n+' &middot; '+scoreVerdict(n)+'</span>';}
function overallScore(paras){if(!paras||!paras.length)return 0;var weights={hook:30,ctx:20,body:25,cta:15,out:10},tw=0,ts=0;paras.forEach(function(p){var w=weights[p.tag]||10,sc=scoreText(p.tag,p.text);tw+=w;ts+=sc*w;});return tw>0?Math.round(ts/tw):0;}

// ── Firebase ──
function syncToCloud(){
  if(!db||!S.currentUser||S.isGuest)return;
  db.collection('users').doc(S.currentUser.uid).set({data:JSON.stringify(S.scripts),updatedAt:new Date().toISOString()},{merge:true}).catch(function(){});
}
function loadFromCloud(){
  if(!db||!S.currentUser||S.isGuest)return;
  db.collection('users').doc(S.currentUser.uid).get().then(function(doc){
    if(doc.exists&&doc.data().data){
      var cloud=JSON.parse(doc.data().data||'[]');
      if(cloud.length>S.scripts.length){S.scripts=cloud;save();renderScripts();}
      if(doc.data().pro){localStorage.setItem(PRO_KEY,'true');}
    }
  }).catch(function(){});
}
function checkProCode(code){
  if(!code)return;
  if(!db){showToast('Sign in to use promo codes','error');return;}
  var c=code.toUpperCase().trim();
  db.collection('promo_codes').doc(c).get().then(function(doc){
    if(!doc.exists||doc.data().used){showToast('Invalid or used code','error');return;}
    db.collection('promo_codes').doc(c).update({used:true,used_by:S.currentUser?S.currentUser.uid:'guest',used_at:new Date().toISOString()}).then(function(){
      localStorage.setItem(PRO_KEY,'true');
      if(S.currentUser){db.collection('users').doc(S.currentUser.uid).set({pro:true,pro_code:c,pro_unlocked_at:new Date().toISOString()},{merge:true});}
      showToast('Pro unlocked! Welcome.','success');
      renderProfile();
      safeGtag('event','pro_unlock',{method:'coupon'});
    });
  }).catch(function(){showToast('Could not verify code','error');});
}

// ── Toast ──
var toastTimer=null;
function showToast(msg,type,icon){
  var el=document.getElementById('toast');
  var icons={success:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>',error:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>',info:'<svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'};
  el.className='toast '+(type||'default');
  el.innerHTML=(icons[type]||'')+escHtml(msg);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){el.classList.remove('show');},2800);
}

function goScreen(name){

    if(el)el.classList.toggle('on',s===name);

}

function updateHeader(screen){
  var logo=document.getElementById('headerLogo');
  var right=document.getElementById('headerRight');

  right.innerHTML='';

}

// ── Hub pill ──

  var analyseIco='<path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>';

function toggleHubPill(){S.hubPillOpen=!S.hubPillOpen;document.getElementById('headerRight').innerHTML=buildHubPillHTML();}
function setHubTab(tab){
  S.activeHubTab=tab;S.hubPillOpen=false;
  document.getElementById('headerRight').innerHTML=buildHubPillHTML();
  ['stats','analyse','workspace'].forEach(function(t){
    var id='hub'+t.charAt(0).toUpperCase()+t.slice(1);
    var el=document.getElementById(id);
    if(el)el.classList.toggle('hide',t!==tab);
  });
  if(tab==='stats')renderStats();
  if(tab==='analyse')renderAnalyse();
}

// ── Scripts screen ──
var activeFilter=null,searchOpen=false;
function toggleSearch(){
  searchOpen=!searchOpen;
  document.getElementById('searchBar').classList.toggle('hide',!searchOpen);
  if(searchOpen)document.getElementById('searchInp').focus();
  else{document.getElementById('searchInp').value='';renderScripts();}
}
function clearSearch(){document.getElementById('searchInp').value='';toggleSearch();}
function setFilter(btn,f){
  // Double-tap same pill to deselect (show all)
  if(activeFilter===f){activeFilter=null;document.querySelectorAll('.fpill').forEach(function(p){p.classList.remove('on');});}
  else{activeFilter=f;document.querySelectorAll('.fpill').forEach(function(p){p.classList.toggle('on',p.dataset.filter===f);});}
  renderScripts();
}
function renderScripts(){
  var el=document.getElementById('scriptsList');
  var q=(document.getElementById('searchInp')?document.getElementById('searchInp').value:'').toLowerCase();
  var list=S.scripts.filter(function(s){
    var matchQ=!q||s.title.toLowerCase().indexOf(q)>=0;
    var matchF=!activeFilter||activeFilter===null||s.status===activeFilter;
    return matchQ&&matchF;
  });
  if(list.length===0){
    if(S.scripts.length===0){
      el.innerHTML='<div class="empty-state"><div class="eico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg></div><h3>Your first script is waiting</h3><p>Structure your Hook, build your Context, nail your CTA. Every great video starts here.</p><button class="add-btn" onclick="openModal(\'newScript\')" style="margin:0 auto;"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5" style="width:14px;height:14px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>Write your first script</button><div class="empty-hint">Scripts save automatically as you write.<br/>Sign in anytime to back them up.</div></div>';
    }else{
      el.innerHTML='<div class="empty-state"><div class="eico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></div><h3>No matches</h3><p>Try a different search or filter.</p></div>';
    }
    return;
  }
  var statusCls={Draft:'draft','In Progress':'progress',Ready:'ready',Filmed:'filmed'};
  el.innerHTML=list.map(function(s){
    var wc=totalWords(s),pc=(s.paragraphs||[]).length,sc=s.lastScore;
    var chipHTML=sc!=null?'<span class="score-chip '+scoreLevel(sc)+'"><span class="score-chip-dot"></span>'+sc+'</span>':'';
    return '<div class="scard" id="sc_'+s.id+'" ontouchstart="" >'+
      '<div class="scard-inner" onclick="openScript(\''+s.id+'\')">'+
      '<div class="scard-ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>'+
      '<div class="scard-info"><div class="scard-name">'+escHtml(s.title)+'</div>'+
      '<div class="scard-meta">'+wc+' words &nbsp;&middot;&nbsp; '+pc+' '+(pc===1?'section':'sections')+' &nbsp;&middot;&nbsp; '+timeAgo(s.updatedAt)+'</div>'+
      '<div class="scard-row"><span class="sbadge '+(statusCls[s.status]||'draft')+'" onclick="event.stopPropagation();cycleStatus(\''+s.id+'\');" style="cursor:pointer;"><span class="sbadge-dot"></span>'+(s.status||'Draft')+'</span>'+chipHTML+'</div></div>'+
      '<button class="pb-action" onclick="event.stopPropagation();openScriptMenu(\''+s.id+'\')" style="padding:8px;color:var(--muted);background:none;border:none;"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" style="width:16px;height:16px;"><path stroke-linecap="round" stroke-linejoin="round" d="M12 5v.01M12 12v.01M12 19v.01"/></svg></button>'+
      '</div></div>';
  }).join('');
}

function openScript(id){S.activeId=id;goScreen('write');}

function openScriptMenu(id){
  var s=S.scripts.find(function(x){return x.id===id;});
  if(!s)return;
  var statuses=['Draft','In Progress','Ready','Filmed'];
  var statusOpts=statuses.map(function(st){
    return '<button class="tag-opt'+(s.status===st?' on':'')+'" style="color:var(--text);border-color:var(--border);" onclick="setScriptStatus(\''+id+'\',\''+st+'\');closeMoForce();">'+st+'</button>';
  }).join('');
  openModal('_raw','<div class="mhandle"></div><div class="modal-title">'+escHtml(s.title)+'</div><div class="modal-sub">Tap a status to update, or delete this script.</div><div class="tag-sel">'+statusOpts+'</div><div class="modal-acts"><button class="btn-g" onclick="closeMoForce()">Cancel</button><button class="btn-danger active" onclick="confirmDeleteScript(\''+id+'\')">Delete</button></div>');
}

function cycleStatus(id){
  var order=['Draft','In Progress','Ready','Filmed'];
  var s=S.scripts.find(function(x){return x.id===id;});
  if(!s)return;
  var idx=order.indexOf(s.status||'Draft');
  var next=order[(idx+1)%order.length];
  setScriptStatus(id,next);
  showToast(next,'default');
}
function setScriptStatus(id,status){
  var s=S.scripts.find(function(x){return x.id===id;});
  if(!s)return;
  s.status=status;s.updatedAt=new Date().toISOString();
  save();syncToCloud();renderScripts();
}

function confirmDeleteScript(id){
  var s=S.scripts.find(function(x){return x.id===id;});
  if(!s)return;
  openModal('_raw','<div class="mhandle"></div><div class="modal-title">Delete script?</div><div class="modal-sub" style="color:var(--text);font-weight:600;">'+escHtml(s.title)+'</div><p style="font-size:.76rem;color:var(--muted);margin:8px 0 16px;">This cannot be undone.</p><div class="modal-acts"><button class="btn-g" onclick="closeMoForce()">Cancel</button><button class="btn-danger active" onclick="deleteScript(\''+id+'\');closeMoForce();">Yes, delete</button></div>');
}
function deleteScript(id){
  S.scripts=S.scripts.filter(function(s){return s.id!==id;});
  if(S.activeId===id)S.activeId=null;
  save();syncToCloud();renderScripts();
  showToast('Script deleted','default');
}
</script>
<script>
// ── Write screen ──
function renderWrite(){
  var script=getActive();
  var titleEl=document.getElementById('writeTitleLbl');
  var pbList=document.getElementById('pbList');
  var addBar=document.getElementById('pbAddBar');
  if(!script){
    titleEl.textContent='Select a script';
    pbList.innerHTML='<div class="write-empty"><p>Open a script from the Scripts tab to start writing.</p></div>';
    if(addBar)addBar.classList.add('hide');
    return;
  }
  titleEl.textContent=script.title;
  if(addBar)addBar.classList.remove('hide');
  if(!(script.paragraphs&&script.paragraphs.length)){
    pbList.innerHTML='<div class="write-empty"><p>No paragraphs yet.<br/>Add your first section below.</p></div>';
    return;
  }
  pbList.innerHTML=script.paragraphs.map(function(p){
    var tag=TAGS[p.tag]||TAGS.hook;
    var sc=scoreText(p.tag,p.text);
    var wc=wordCount(p.text);
    return '<div class="pb '+tag.cls+'" id="pb_'+p.id+'">'+
      '<div class="pb-hd">'+
      '<span class="pb-tag">'+tag.label+'</span>'+
      scorePillHTML(sc)+
      '</div>'+
      '<div class="pb-body"><textarea class="pb-ta" rows="3" placeholder="Write your '+tag.label.toLowerCase()+'..." onblur="saveParagraph(\''+p.id+'\',this.value)" oninput="autoResize(this);liveScore(\''+p.id+'\',\''+p.tag+'\',this.value)">'+escHtml(p.text)+'</textarea></div>'+
      '<div class="pb-ft"><span class="pb-wc" id="wc_'+p.id+'">'+wc+' words</span>'+
      '<div class="pb-actions">'+
      '<button class="pb-action" onclick="moveParagraph(\''+p.id+'\',-1)" title="Move up"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 15l7-7 7 7"/></svg></button>'+
      '<button class="pb-action" onclick="moveParagraph(\''+p.id+'\',1)" title="Move down"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/></svg></button>'+
      '<button class="pb-action" onclick="changeParagraphTag(\''+p.id+'\')" title="Change tag"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg></button>'+
      '<button class="pb-action" onclick="confirmDeleteParagraph(\''+p.id+'\')" title="Delete" style="color:var(--s-low)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>'+
      '</div></div></div>';
  }).join('');
  document.querySelectorAll('.pb-ta').forEach(function(ta){autoResize(ta);});
}

function editScriptTitle(){
  var script=getActive();if(!script)return;
  openModal('_raw','<div class="mhandle"></div><div class="modal-title">Rename Script</div><input class="modal-inp" id="renameTitleInp" value="'+escHtml(script.title)+'" maxlength="120" onkeydown="if(event.key===\'Enter\')saveScriptTitle()"/><div class="modal-acts"><button class="btn-g" onclick="closeMoForce()">Cancel</button><button class="btn-p" onclick="saveScriptTitle()">Save</button></div>');
  setTimeout(function(){var i=document.getElementById('renameTitleInp');if(i){i.focus();i.select();}},180);
}
function saveScriptTitle(){
  var inp=document.getElementById('renameTitleInp');
  var val=inp?inp.value.trim():'';
  if(!val){showToast('Title cannot be empty','error');return;}
  var script=getActive();if(!script)return;
  script.title=val;script.updatedAt=new Date().toISOString();
  save();syncToCloud();
  document.getElementById('writeTitleLbl').textContent=val;
  closeMoForce();
  showToast('Renamed','success');
}
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}

function liveScore(pid,tag,text){
  var sc=scoreText(tag,text);
  var pill=document.querySelector('#pb_'+pid+' .score-pill');
  if(pill){pill.className='score-pill '+scoreLevel(sc);pill.innerHTML='<span class="score-pill-dot"></span>'+sc+' &middot; '+scoreVerdict(sc);}
  var wcel=document.getElementById('wc_'+pid);
  if(wcel)wcel.textContent=wordCount(text)+' words';
}

function saveParagraph(pid,text){
  var script=getActive();if(!script)return;
  script.paragraphs.forEach(function(p){if(p.id===pid){p.text=text;p.score=scoreText(p.tag,text);}});
  script.updatedAt=new Date().toISOString();
  script.lastScore=overallScore(script.paragraphs);
  save();syncToCloud();
}

function moveParagraph(pid,dir){
  var script=getActive();if(!script)return;
  var ps=script.paragraphs,i=-1;
  for(var x=0;x<ps.length;x++){if(ps[x].id===pid){i=x;break;}}
  var j=i+dir;if(j<0||j>=ps.length)return;
  var tmp=ps[i];ps[i]=ps[j];ps[j]=tmp;
  script.updatedAt=new Date().toISOString();save();renderWrite();
}

function confirmDeleteParagraph(pid){
  openModal('_raw','<div class="mhandle"></div><div class="modal-title">Delete this paragraph?</div><p style="font-size:.78rem;color:var(--muted);margin-bottom:16px;">This cannot be undone.</p><div class="modal-acts"><button class="btn-g" onclick="closeMoForce()">Cancel</button><button class="btn-danger active" onclick="deleteParagraph(\''+pid+'\');closeMoForce();">Delete</button></div>');
}
function deleteParagraph(pid){
  var script=getActive();if(!script)return;
  script.paragraphs=script.paragraphs.filter(function(p){return p.id!==pid;});
  script.updatedAt=new Date().toISOString();
  script.lastScore=overallScore(script.paragraphs);
  save();renderWrite();
}

function changeParagraphTag(pid){
  var script=getActive();if(!script)return;
  var p=null;for(var i=0;i<script.paragraphs.length;i++){if(script.paragraphs[i].id===pid){p=script.paragraphs[i];break;}}
  if(!p)return;
  var opts=Object.keys(TAGS).map(function(k){return '<button class="tag-opt '+k+(p.tag===k?' on':'')+'" onclick="applyTagChange(\''+pid+'\',\''+k+'\');closeMo()">'+TAGS[k].label+'</button>';}).join('');
  openModal('_raw','<div class="mhandle"></div><div class="modal-title">Change Tag</div><div class="modal-sub">Choose a new tag for this paragraph.</div><div class="tag-sel">'+opts+'</div>');
}

function applyTagChange(pid,tag){
  var script=getActive();if(!script)return;
  script.paragraphs.forEach(function(p){if(p.id===pid){p.tag=tag;p.score=scoreText(tag,p.text);}});
  script.updatedAt=new Date().toISOString();save();renderWrite();
}

// ── Drawer ──
function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('dov').classList.add('open');
  renderDrawerTab();
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('dov').classList.remove('open');
}
function switchDrawerTab(btn){
  S.drawerTab=btn.dataset.tab;
  document.querySelectorAll('.dtab').forEach(function(t){t.classList.toggle('on',t===btn);});
  renderDrawerTab();
}
function renderDrawerTab(){
  var script=getActive(),body=document.getElementById('drawerBody'),tab=S.drawerTab;
  if(!script){body.innerHTML='<p style="font-size:.8rem;color:var(--muted);text-align:center;padding:20px 0;">Open a script first.</p>';return;}
  if(!script.notes)script.notes={facts:[],ideas:[],links:[],notes:[]};
  var items=script.notes[tab]||[];
  var html='';
  if(tab==='links'){
    html=items.map(function(item,i){
      var openBtn='<button class="link-open" onclick="window.open(\'' + encodeURI(item.url||'') + '\',\'_blank\')" title="Open"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></button>';
      var delBtn='<button class="fact-del" onclick="deleteNote(\'links\',' + i + ')" title="Remove"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>';
      return '<div class="link-item">' +
        '<div class="link-ico"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg></div>' +
        '<div class="link-info"><div class="link-label">' + escHtml(item.label||item.url||'') + '</div><div class="link-url">' + escHtml(item.url||'') + '</div></div>' +
        openBtn + delBtn + '</div>';
    }).join('');
    html+='<button class="add-fact-btn" onclick="openModal(\'addLink\')">+ Add a link</button>';
  }else{
    html=items.map(function(item,i){
      var txt=typeof item==='string'?item:(item.text||'');
      return '<div class="fact-item"><div class="fact-dot"></div><div class="fact-text">'+escHtml(txt)+'</div>'+
      '<button class="fact-del" onclick="deleteNote(\''+tab+'\','+i+')"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button></div>';
    }).join('');
    var singular={facts:'fact',ideas:'idea',links:'link',notes:'note'}[tab]||tab;
    html+='<button class="add-fact-btn" onclick="openModal(\'addNote\',\''+tab+'\')">+ Add a '+singular+'</button>';
  }
  body.innerHTML=html||'<p style="font-size:.78rem;color:var(--muted);text-align:center;padding:16px 0;">No '+tab+' yet.</p>';
  body.innerHTML+=html?'':'';
}
function deleteNote(tab,idx){
  var script=getActive();if(!script||!script.notes)return;
  script.notes[tab].splice(idx,1);save();renderDrawerTab();
}

// ── View Script ──
function openViewScript(){
  var script=getActive();if(!script)return;
  document.getElementById('viewScriptScreen').classList.remove('hide');
  document.getElementById('viewTitle').textContent=script.title;
  var wc=totalWords(script),pc=(script.paragraphs||[]).length,mins=Math.max(1,Math.round(wc/130));
  document.getElementById('viewMeta').innerHTML=wc+' words <div class="view-meta-dot"></div> '+pc+' section'+(pc===1?'':'s')+' <div class="view-meta-dot"></div> ~'+mins+' min read';
  var html='<div class="view-script-title">'+escHtml(script.title)+'</div>';
  (script.paragraphs||[]).forEach(function(p){
    var barCls=p.tag==='body'?'body-t':p.tag;
    html+='<div class="view-section"><div class="view-bar '+barCls+'"></div><div class="view-para">'+escHtml(p.text)+'</div></div>';
  });
  html+='<div class="view-footer"><span>Scripora</span><span>scripora.app</span></div>';
  document.getElementById('viewBody').innerHTML=html;
}
function closeViewScript(){document.getElementById('viewScriptScreen').classList.add('hide');}

function copyScript(){
  var script=getActive();if(!script)return;
  var txt=script.title+'\n\n'+(script.paragraphs||[]).map(function(p){return (TAGS[p.tag]||TAGS.hook).label+':\n'+p.text;}).join('\n\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){showToast('Copied to clipboard','success');}).catch(function(){copyFallback(txt);});
  }else{copyFallback(txt);}
}
function copyFallback(txt){
  var ta=document.createElement('textarea');
  ta.value=txt;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('Copied to clipboard','success');}
  catch(e){showToast('Copy failed — try long-pressing the text','error');}
  document.body.removeChild(ta);
}
function downloadScript(){
  var script=getActive();if(!script)return;
  var txt=script.title+'\n\n'+(script.paragraphs||[]).map(function(p){return (TAGS[p.tag]||TAGS.hook).label+':\n'+p.text;}).join('\n\n');
  var a=document.createElement('a');
