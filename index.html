<link rel="preconnect" href="https://fonts.googleapis.com"/>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="styles.css"/>


<!-- ═══════════ LOGIN ═══════════ -->
<div id="loginScreen">
  <div class="ls-wordmark"><em>Scrip</em><span>ora</span></div>
  <div class="ls-tagline">Write with intention</div>
  <div class="ls-actions">
    <button <button class="ls-google" onclick="signInGoogle()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" style="width:20px;height:20px;flex-shrink:0;">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
      </svg>
      Continue with Google
    </button>
    <button class="ls-guest" onclick="continueGuest()">Write without an account</button>
  </div>
  <div class="ls-footer">
    <span onclick="openModal('privacy')">Privacy Policy</span>
    <span style="color:rgba(255,255,255,.1)">·</span>
    <span onclick="openModal('terms')">Terms</span>
  </div>
</div>

<!-- ═══════════ APP ═══════════ -->
<div id="app" class="hide">

  <!-- HEADER -->
  <header id="appHeader">
    <div class="logo" id="headerLogo"><em>Scrip</em><span>ora</span></div>
    <div class="hdr-right" id="headerRight">
      <!-- dynamically populated per screen -->
    </div>
  </header>

  <!-- SCREENS -->
  <div class="screens">

    <!-- ── SCRIPTS ── -->
    <div class="screen on" id="screen-scripts">
      <div class="bulk-bar hide" id="bulkBar">
        <span class="bulk-count" id="bulkCount">0 selected</span>
        <div class="bulk-actions">
          <button class="bulk-cancel-btn" onclick="exitBulkMode()">Cancel</button>
          <button class="bulk-delete-btn" onclick="bulkDelete()">Delete</button>
        </div>
      </div>
      <div class="search-bar hide" id="searchBar">
        <div class="search-inner">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input class="search-inp" id="searchInp" placeholder="Search scripts" oninput="renderScripts()"/>
          <button class="search-clear" onclick="clearSearch()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
        </div>
      </div>
      <div class="filter-wrap">
        <div class="filter-row" id="filterRow">
          <button class="fpill" data-filter="Draft" onclick="setFilter(this,'Draft')">Draft</button>
          <button class="fpill" data-filter="In Progress" onclick="setFilter(this,'In Progress')">In Progress</button>
          <button class="fpill" data-filter="Ready" onclick="setFilter(this,'Ready')">Ready</button>
          <button class="fpill" data-filter="Filmed" onclick="setFilter(this,'Filmed')">Filmed</button>
        </div>
        <button class="add-pill" onclick="openModal('newScript')" title="New Script">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
        </button>
      </div>
      <div class="scr-scroll">
        <div class="scripts-list" id="scriptsList"></div>
      </div>
     
    </div>

    <!-- ── WRITE ── -->
    <div class="screen" id="screen-write">
      <div class="write-hdr">
        <div class="write-title" id="writeTitleLbl" onclick="editScriptTitle()" title="Tap to rename" style="cursor:pointer;">Select a script</div>
        <div class="write-actions">
          <button class="hdr-btn" onclick="openDrawer()" title="Notes">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          </button>
          <button class="hdr-btn" onclick="openViewScript()" title="View Script">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>
      <div class="scr-scroll">
        <div id="pbList" class="pb-list"></div>
        <div class="pb-add-bar hide" id="pbAddBar">
          <button class="pb-add-btn" onclick="openModal('addParagraph')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
            Add Paragraph
          </button>
        </div>
      </div>
    </div>

    <!-- ── PROFILE ── -->
    <div class="screen" id="screen-profile">
      <div class="scr-scroll">
        <div id="profileContent"></div>
      </div>
    </div>

  </div><!-- /screens -->

  <!-- NAV -->
  <nav>
    <button class="nt on" id="nt-scripts" onclick="goScreen('scripts')">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      Scripts
    </button>
    <button class="nt" id="nt-write" onclick="goScreen('write')">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      Write
    </button>
    <button class="nt" id="nt-profile" onclick="goScreen('profile')">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Profile
    </button>
  </nav>

</div><!-- /app -->

<!-- DRAWER OVERLAY -->
<div class="dov" id="dov" onclick="closeDrawer()"></div>

<!-- NOTES DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-hd">
    <div class="drawer-title">Script Notes</div>
    <button class="drawer-close" onclick="closeDrawer()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
  </div>
  <div class="drawer-tabs">
    <button class="dtab on" data-tab="facts" onclick="switchDrawerTab(this)">Facts</button>
    <button class="dtab" data-tab="ideas" onclick="switchDrawerTab(this)">Ideas</button>
    <button class="dtab" data-tab="links" onclick="switchDrawerTab(this)">Links</button>
    <button class="dtab" data-tab="notes" onclick="switchDrawerTab(this)">Notes</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- VIEW SCRIPT -->
<div id="viewScriptScreen" class="hide" style="position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;">
  <div class="view-hdr">
    <button class="view-back" onclick="closeViewScript()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="view-title" id="viewTitle"></div>
    <div class="view-acts">
      <button class="hdr-btn" title="Copy" onclick="copyScript()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
      <button class="hdr-btn" title="Download" onclick="downloadScript()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></button>
      <button class="hdr-btn" title="Portfolio" onclick="openPortfolio()" style="color:var(--accent)"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></button>
    </div>
  </div>
  <div class="view-meta" id="viewMeta"></div>
  <div style="flex:1;overflow-y:auto;">
    <div class="view-body" id="viewBody"></div>
  </div>
</div>


<!-- PORTFOLIO TRIGGER -->
<div id="portfolioScreen" class="hide" style="position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;">
  <div class="view-hdr">
    <button class="view-back" onclick="closePortfolio()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="view-title" id="portTitle"></div>
  </div>
  <div style="flex:1;overflow-y:auto;">
    <div class="port-trigger-body" id="portBody"></div>
  </div>
</div>

<!-- HELP SCREEN -->
<div id="helpScreen" class="hide" style="position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;">
  <div class="res-hdr">
    <button class="res-back" onclick="closeHelp()"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg></button>
    <div class="res-title">Help &amp; Guide</div>
  </div>
  <div style="display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto;scrollbar-width:none;">
    <button class="help-tab on" id="htab-start" onclick="switchHelpTab('start')">Start</button>
    <button class="help-tab" id="htab-write" onclick="switchHelpTab('write')">Writing</button>
    <button class="help-tab" id="htab-account" onclick="switchHelpTab('account')">Account</button>
  </div>
  <div style="flex:1;overflow-y:auto;padding:16px 14px 32px;" id="helpBody"></div>
</div>
<!-- ONBOARDING -->
<div id="onboardScreen" class="hide" style="position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:28px 24px 36px;">
    <div id="obSlides"></div>
    <div style="display:flex;justify-content:center;gap:6px;margin:16px 0;"><div class="ob-dot on" id="od0"></div><div class="ob-dot" id="od1"></div><div class="ob-dot" id="od2"></div><div class="ob-dot" id="od3"></div><div class="ob-dot" id="od4"></div></div>
    <div style="display:flex;gap:10px;"><button class="btn-g" id="obBack" onclick="obPrev()" style="display:none;">Back</button><button class="btn-a active" id="obNext" onclick="obNext()" style="flex:1;">Next</button></div>
  </div>
</div>
<!-- TOAST -->
<div class="toast default" id="toast"></div>

<!-- MODAL OVERLAY -->
<div class="mo" id="mo" onclick="closeMo(event)" ontouchend="closeMoTouch(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()"></div>
</div>











<script src="engine.js"></script>
<script src="sync.js"></script>
<script src="app.js"></script>
</body>
</html>
